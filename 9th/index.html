<!DOCTYPE html>
<html>
<head>
    <title>Alert Buttons</title>
    <style>
        button {
            padding: 15px 25px;
            border: none;
            color: white;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
        }
        .success { background: green; }
        .info { background: blue; }
        .warning { background: orange; }
        .danger { background: red; }
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
<button class="success" onclick="alert('Success!')">Success</button>
<button class="info" onclick="alert('Information!')">Info</button>
<button class="warning" onclick="alert('Warning!')">Warning</button>
<button class="danger" onclick="alert('Danger!')">Danger</button>
</body>
</html>
